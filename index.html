<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="记录生活、学习和成长的点滴" />
  <title>创意想法 - 个人博客</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Markdown 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // marked.js CDN 备用方案
    if (typeof marked === 'undefined') {
      document.write('<script src="https://unpkg.com/marked/marked.min.js"><\/script>');
    }
  </script>
</head>
<body>
  <!-- ========== 导航栏 ========== -->
  <header class="navbar">
    <div class="container nav-inner">
      <a href="#/" class="logo" id="site-name">创意想法</a>
      <nav class="nav-links" id="nav-links"></nav>
      <div class="nav-actions">
        <button class="btn-icon" id="search-toggle" title="搜索" aria-label="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn-icon" id="theme-toggle" title="切换主题" aria-label="切换主题">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="btn-icon hamburger" id="menu-toggle" title="菜单" aria-label="菜单">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
    <!-- 搜索弹窗 -->
    <div class="search-overlay" id="search-overlay">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索文章..." autocomplete="off" />
        <div class="search-results" id="search-results"></div>
      </div>
    </div>
  </header>

  <!-- ========== 主内容区 ========== -->
  <main class="main container" id="main-content">
    <!-- 动态渲染 -->
  </main>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <div class="container" id="footer-text"></div>
  </footer>

  <!-- ========== 回到顶部 ========== -->
  <button class="back-to-top" id="back-to-top" title="回到顶部" aria-label="回到顶部">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <!-- ========== JS ========== -->
  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
